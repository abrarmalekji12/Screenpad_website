<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ScreenPad</title>
  <script>
    // GitHub Pages SPA redirect: encode path into query string for index.html to decode
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') +
      '/?p=' + encodeURIComponent(l.pathname + l.search) +
      '#' + l.hash.slice(1)
    );
  </script>
</head>
<body></body>
</html>
